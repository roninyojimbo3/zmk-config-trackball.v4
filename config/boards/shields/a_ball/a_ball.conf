# Turn off USB logging
CONFIG_ZMK_USB_LOGGING=n

# Sleep enabled
CONFIG_ZMK_SLEEP=y

# Optional: 2-hour sleep timeout, same idea as your dongle build
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

# These are troubleshooting items
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# Trackball / sensor support
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y

# Left-thumb orientation by default.
#CONFIG_PMW3610_ALT_SWAP_XY=y
CONFIG_PMW3610_ALT_INVERT_X=y
#CONFIG_PMW3610_ALT_INVERT_Y=y

# Sensor timing / troubleshooting
# CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12
#CONFIG_PMW3610_ALT_LOG_LEVEL_DBG=y
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=2000
# <-- see Troubleshooting

# Stock-style Bluetooth profiles
# Stock ThumbsUp behavior is BT_NXT cycling profiles, not the custom BT_SELECT layer.
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

CONFIG_ZMK_KEYBOARD_NAME="Trackball v.4"
